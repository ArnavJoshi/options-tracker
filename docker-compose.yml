services:
  options-tracker:
    build: .
    image: options-tracker:latest
    container_name: options-tracker
    ports:
      - "8501:8501"   # Streamlit dashboard
    volumes:
      - ./.cache:/app/.cache   # persist generated cache files across restarts
      - ./all_tickers.txt:/app/all_tickers.txt:ro   # ticker universe — update without rebuild
    restart: unless-stopped

